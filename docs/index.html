<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashraf Morningstar - 3D Realm</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: 'Courier New', Courier, monospace; }
        #canvas-container { width: 100vw; height: 100vh; }
        #overlay { position: absolute; top: 20px; left: 20px; pointer-events: none; }
        h1 { margin: 0; text-shadow: 0 0 10px #00ffff; }
        p { text-shadow: 0 0 5px #ff00ff; }
        #enter-btn {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            padding: 15px 30px; background: rgba(0, 255, 255, 0.2); border: 2px solid #00ffff;
            color: #00ffff; font-size: 1.2rem; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 2px;
        }
        #enter-btn:hover { background: #00ffff; color: #000; box-shadow: 0 0 20px #00ffff; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="overlay">
        <h1>ASHRAF MORNINGSTAR</h1>
        <p>Quantum Architect // Level 99</p>
    </div>
    <div id="canvas-container"></div>
    <a id="enter-btn" href="https://github.com/AshrafMorningstar">RETURN TO GITHUB</a>

    <script>
        // TEH SCENE
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        scene.fog = new THREE.FogExp2(0x050510, 0.002);

        // CAMERA
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        // RENDERER
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // GEOMETRY - QUANTUM CORE (Icosahedron)
        const geometry = new THREE.IcosahedronGeometry(1.5, 1);
        const material = new THREE.MeshNormalMaterial({ wireframe: true });
        const core = new THREE.Mesh(geometry, material);
        scene.add(core);

        // PARTICLES
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 2000;
        const posArray = new Float32Array(particlesCount * 3);
        for(let i = 0; i < particlesCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 20;
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particlesMaterial = new THREE.PointsMaterial({ size: 0.02, color: 0x00ffff });
        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);

        // LIGHTS
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xff00ff, 1);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        // ANIMATION LOOP
        const animate = function () {
            requestAnimationFrame(animate);

            core.rotation.x += 0.005;
            core.rotation.y += 0.005;

            particlesMesh.rotation.y -= 0.002;
            
            // Mouse interaction (simple sway)
            const time = Date.now() * 0.0005;
            camera.position.x = Math.sin(time) * 0.5;
            camera.position.y = Math.cos(time) * 0.5;
            camera.lookAt(0, 0, 0);

            renderer.render(scene, camera);
        };

        animate();

        // RESIZE
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
