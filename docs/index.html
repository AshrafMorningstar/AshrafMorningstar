<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashraf Morningstar - Quantum Realm</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #fff; font-family: 'Courier New', Courier, monospace; }
        #canvas-container { width: 100vw; height: 100vh; }
        #overlay { position: absolute; top: 20px; left: 20px; pointer-events: none; }
        h1 { margin: 0; text-shadow: 0 0 10px #00ffff; font-size: 2rem; }
        p { text-shadow: 0 0 5px #ff00ff; }
        #enter-btn {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            padding: 15px 30px; background: rgba(0, 0, 0, 0.7); border: 2px solid #00ffff;
            color: #00ffff; font-size: 1.2rem; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 2px; text-decoration: none;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }
        #enter-btn:hover { background: #00ffff; color: #000; box-shadow: 0 0 30px #00ffff; }
        .hud-text {
            position: absolute;
            background: rgba(0, 20, 40, 0.8);
            border: 1px solid #00ffff;
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
            display: none;
            color: #00ffff;
            box-shadow: 0 0 10px #00ffff;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
</head>
<body>
    <div id="overlay">
        <h1>ASHRAF MORNINGSTAR</h1>
        <p>Quantum Architect // Level 99 // <span id="status">Scanning Sector...</span></p>
    </div>
    
    <div id="tooltip" class="hud-text"></div>
    <div id="canvas-container"></div>
    
    <a id="enter-btn" href="https://github.com/AshrafMorningstar">RETURN TO BASE</a>

    <script>
        // SCENE SETUP
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020205);
        scene.fog = new THREE.FogExp2(0x020205, 0.0015);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 15;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // LIGHTING
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const lights = [];
        const lightColors = [0x00ffff, 0xff00ff, 0x00ff00];
        for(let i=0; i<3; i++) {
            const light = new THREE.PointLight(lightColors[i], 1, 50);
            light.position.set((Math.random()-0.5)*20, (Math.random()-0.5)*20, (Math.random()-0.5)*20);
            scene.add(light);
            lights.push(light);
        }

        // OBJECTS
        const techStack = [
            { name: "React", color: 0x61DAFB },
            { name: "Node.js", color: 0x68A063 },
            { name: "Python", color: 0x3776AB },
            { name: "Rust", color: 0DEA577 },
            { name: "CyberSec", color: 0xFF0000 },
            { name: "Unity", color: 0xFFFFFF }
        ];

        const objects = [];
        const geometry = new THREE.BoxGeometry(1.5, 1.5, 1.5);

        techStack.forEach((tech, index) => {
            const material = new THREE.MeshPhongMaterial({ 
                color: tech.color, 
                shininess: 100, 
                wireframe: false,
                transparent: true,
                opacity: 0.8
            });
            const cube = new THREE.Mesh(geometry, material);
            
            // Orbit placement
            const angle = (index / techStack.length) * Math.PI * 2;
            const radius = 6;
            cube.position.x = Math.cos(angle) * radius;
            cube.position.z = Math.sin(angle) * radius;
            cube.userData = { name: tech.name, originalPos: cube.position.clone() };
            
            scene.add(cube);
            objects.push(cube);

            // Add wireframe cage
            const cageGeo = new THREE.BoxGeometry(1.6, 1.6, 1.6);
            const cageMat = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.3 });
            const cage = new THREE.Mesh(cageGeo, cageMat);
            cube.add(cage);
        });

        // CORE
        const coreGeo = new THREE.IcosahedronGeometry(2, 1);
        const coreMat = new THREE.MeshPhongMaterial({ color: 0x00ffff, wireframe: true });
        const core = new THREE.Mesh(coreGeo, coreMat);
        scene.add(core);

        // STARFIELD
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 5000;
        const posArray = new Float32Array(starsCount * 3);
        for(let i = 0; i < starsCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 100;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const starsMaterial = new THREE.PointsMaterial({ size: 0.05, color: 0xffffff });
        const starField = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(starField);

        // RAYCASTER
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const tooltip = document.getElementById('tooltip');

        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            // Tooltip follow
            tooltip.style.left = event.clientX + 15 + 'px';
            tooltip.style.top = event.clientY + 15 + 'px';
        });

        // ANIMATION
        let time = 0;
        const animate = function () {
            requestAnimationFrame(animate);
            time += 0.01;

            // Rotate Core
            core.rotation.x += 0.005;
            core.rotation.y += 0.01;

            // Rotate Starfield
            starField.rotation.y -= 0.001;

            // Animate Lights
            lights.forEach((light, i) => {
                light.position.y = Math.sin(time + i) * 10;
                light.position.x = Math.cos(time + i) * 10;
            });

            // Animate Objects
            objects.forEach((obj, i) => {
                obj.rotation.x += 0.01;
                obj.rotation.y += 0.01;
                
                // Bobbing effect
                obj.position.y = Math.sin(time * 2 + i) * 0.5;
            });

            // Raycasting
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(objects);

            if (intersects.length > 0) {
                const intersect = intersects[0];
                const obj = intersect.object;
                
                document.body.style.cursor = 'pointer';
                tooltip.style.display = 'block';
                tooltip.innerText = "MODULE: " + obj.userData.name;
                
                obj.scale.set(1.2, 1.2, 1.2);
            } else {
                document.body.style.cursor = 'default';
                tooltip.style.display = 'none';
                objects.forEach(obj => obj.scale.set(1, 1, 1));
            }

            // Camera drift
            camera.position.x = Math.sin(time * 0.1) * 2;
            camera.position.y = Math.cos(time * 0.1) * 2;
            camera.lookAt(0, 0, 0);

            renderer.render(scene, camera);
        };

        animate();

        // RESIZE
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
